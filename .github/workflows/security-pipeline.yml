name: Security Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Docker Compose + unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose unzip

      - name: Build Containers
        run: docker-compose up -d --build

      - name: Wait for user-service
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3002/health && echo "READY" && exit 0
            echo "Waiting..."
            sleep 2
          done
          echo "Service failed"
          docker-compose logs user-service
          exit 1

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          nuclei -version
          nuclei -update-templates

      - name: Run Nuclei Scan
        run: |
          nuclei -u http://localhost:3002 -o nuclei-report.txt || true

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-report
          path: nuclei-report.txt