name: Security Pipeline

on:
  push:
    branches: [ main ]

jobs:
  api-security:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 — Install Docker Compose
      - name: Install Docker Compose
        run: sudo apt-get install docker-compose -y

      # Step 3 — Build containers
      - name: Build Containers
        run: docker-compose up -d --build

            # Step 4 — Wait for all services using Docker healthcheck
      - name: Wait for services to be healthy
        run: |
          services=("auth" "user" "order")
          for svc in "${services[@]}"; do
            echo "Waiting for $svc service..."
            for i in $(seq 1 30); do
              status=$(docker inspect -f '{{.State.Health.Status}}' $svc)
              if [ "$status" = "healthy" ]; then
                echo "$svc service is up!"
                break
              fi
              echo "  Attempt $i/30: $svc not ready yet..."
              sleep 5
            done
            final_status=$(docker inspect -f '{{.State.Health.Status}}' $svc)
            if [ "$final_status" != "healthy" ]; then
              echo "Error: $svc did not become healthy in time"
              exit 1
            fi
          done

            # Step 5 — Run OWASP ZAP Full Scan in headless mode
      - name: Run OWASP ZAP Full Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            --network=host \
            --user $(id -u):$(id -g) \
            ghcr.io/zaproxy/zaproxy:latest \
            zap-full-scan.py \
              -t http://localhost:3002 \
              -r report_html.html \
              -w report_md.md \
              -J report_json.json \
              -z "-config api.disablekey=true" \
              -daemon

           # Step 6 — Upload ZAP reports
      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md

            # Step 7 — Fail if High severity vulnerabilities exist
      - name: Fail on High Severity Vulnerabilities
        run: |
          if grep -q '"risk":"High"' report_json.json; then
            echo "High severity vulnerabilities found! Failing workflow."
            exit 1
          else
            echo "No high severity issues found."
          fi

