name: Security Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Docker Compose + unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose unzip

      - name: Build Containers
        run: docker-compose up -d --build

      - name: Wait for user-service
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3002/health && echo "READY" && exit 0
            echo "Waiting..."
            sleep 2
          done
          echo "Service failed"
          docker-compose logs user-service
          exit 1

      - name: Install Nuclei
        run: |
          wget https://github.com/projectdiscovery/nuclei/releases/latest/download/nuclei-linux-amd64.zip
          unzip nuclei-linux-amd64.zip
          sudo mv nuclei /usr/local/bin/
          nuclei -version
          nuclei -update-templates

      - name: Run Nuclei Scan
        run: |
          nuclei -u http://localhost:3002 -o nuclei-report.txt || true

      - name: Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: nuclei-report
          path: nuclei-report.txt