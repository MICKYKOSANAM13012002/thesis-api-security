name: Security Pipeline

on:
  push:
    branches: [ main ]

jobs:
  api-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Docker Compose
        run: sudo apt-get install docker-compose -y

      - name: Build Containers
        run: docker-compose up -d --build

      - name: Wait for user service
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:3002 > /dev/null; then
              echo "User service is up!"
              break
            fi
            echo "Waiting for user service..."
            sleep 5
          done

      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: 'http://localhost:3002'               # your API URL
          docker_name: ghcr.io/zaproxy/zaproxy:stable   # correct Docker image
          issue_title: 'ZAP Full Scan Report'           # report title
          fail_action: false                             # do not fail workflow automatically
          allow_issue_writing: false                     # disables GitHub issue creation
          artifact_name: zap-scan                         # artifact folder name

      - name: Fail on High Severity Vulnerabilities
        run: |
          if grep -q "High" zap-report.html; then
            echo "High severity vulnerabilities found! Failing the build."
            exit 1
          else
            echo "No high severity issues found."
          fi
