name: Security Pipeline

on:
  push:
    branches: [ main ]

jobs:
  api-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Docker Compose
        run: sudo apt-get install docker-compose -y

      - name: Build Containers
        run: docker-compose up -d --build

            - name: Wait for services to be healthy
        run: |
          services=("auth" "user" "order")
          for svc in "${services[@]}"; do
            echo "Waiting for $svc service..."
            for i in $(seq 1 40); do
              container=$(docker-compose ps -q $svc)
              if [ -z "$container" ]; then
                echo "Error: Service $svc container not found"
                exit 1
              fi
              status=$(docker inspect -f '{{.State.Health.Status}}' $container || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "$svc service is up!"
                break
              fi
              echo "  Attempt $i/40: $svc not ready yet..."
              sleep 5
            done
            final_status=$(docker inspect -f '{{.State.Health.Status}}' $container || echo "starting")
            if [ "$final_status" != "healthy" ]; then
              echo "Error: $svc did not become healthy in time"
              exit 1
            fi
          done

      - name: Run OWASP ZAP Full Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            --network=host \
            --user $(id -u):$(id -g) \
            ghcr.io/zaproxy/zaproxy:latest \
            zap-full-scan.py \
              -t http://localhost:3002 \
              -r report_html.html \
              -w report_md.md \
              -J report_json.json \
              -z "-config api.disablekey=true" \
              -daemon

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md

      - name: Fail on High Severity Vulnerabilities
        run: |
          if grep -q '"risk":"High"' report_json.json; then
            echo "High severity vulnerabilities found! Failing workflow."
            exit 1
          else
            echo "No high severity issues found."
          fi
